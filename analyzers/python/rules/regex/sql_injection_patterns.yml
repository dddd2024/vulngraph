rules:
  - id: REGEX-SQL-001
    name: SQL Injection
    type: regex
    severity: ERROR
    engine: regex
    language: python
    cwe: CWE-89
    confidence: medium
    message: "Potential SQL injection via f-string in execute()."
    enabled: true
    pattern:
      regex: 'execute\(\s*f["\x27]SELECT .*?\{.+?\}.*?["\x27]\s*\)'
      flags:
        - DOTALL

  - id: REGEX-SQL-002
    name: SQL Injection
    type: regex
    severity: ERROR
    engine: regex
    language: python
    cwe: CWE-89
    confidence: medium
    message: "Potential SQL injection via % formatting in execute()."
    enabled: true
    pattern:
      regex: 'execute\(\s*["\x27]SELECT .*?["\x27]\s*%\s*.+\)'
      flags:
        - DOTALL