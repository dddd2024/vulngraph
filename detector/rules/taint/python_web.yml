# Python Web 应用污点分析规则
# 定义 sources（污点源）、sinks（污点汇）、sanitizers（净化器）

rules:
  # ========================================
  # SQL Injection 规则
  # ========================================
  - id: TAINT-SQL-001
    name: SQL Injection
    type: taint
    severity: ERROR
    engine: taint
    language: python
    cwe: CWE-89
    confidence: high
    message: "用户输入直接拼接到 SQL 查询中，可能导致 SQL 注入漏洞。"
    enabled: true
    pattern:
      sources:
        # Flask 请求输入
        - name: request.args.get
          description: "Flask GET 参数"
        - name: request.form.get
          description: "Flask POST 表单参数"
        - name: request.values.get
          description: "Flask 合并参数"
        - name: request.get_json
          description: "Flask JSON 请求体"
        - name: request.data
          description: "Flask 原始请求数据"
        # Django 请求输入
        - name: request.GET.get
          description: "Django GET 参数"
        - name: request.POST.get
          description: "Django POST 参数"
        - name: request.body
          description: "Django 请求体"
        # 通用输入
        - name: input
          description: "Python 内置 input 函数"
      sinks:
        # SQL 执行函数
        - name: cursor.execute
          description: "数据库游标执行 SQL"
          vulnerability: "SQL Injection"
        - name: db.execute
          description: "数据库连接执行 SQL"
          vulnerability: "SQL Injection"
        - name: connection.execute
          description: "数据库连接执行 SQL"
          vulnerability: "SQL Injection"
        - name: conn.execute
          description: "数据库连接执行 SQL"
          vulnerability: "SQL Injection"
        - name: engine.execute
          description: "SQLAlchemy 执行 SQL"
          vulnerability: "SQL Injection"
        - name: session.execute
          description: "SQLAlchemy Session 执行 SQL"
          vulnerability: "SQL Injection"
      sanitizers:
        # SQL 参数化查询（通过检查参数）
        - name: cursor.execute
          condition: has_params
          description: "参数化查询"
        - name: db.execute
          condition: has_params
          description: "参数化查询"
        - name: connection.execute
          condition: has_params
          description: "参数化查询"
        # SQLAlchemy 安全方法
        - name: text
          condition: bindparams
          description: "SQLAlchemy text 绑定参数"

  # ========================================
  # Path Traversal 规则
  # ========================================
  - id: TAINT-PT-001
    name: Path Traversal
    type: taint
    severity: ERROR
    engine: taint
    language: python
    cwe: CWE-22
    confidence: high
    message: "用户输入直接用于文件路径操作，可能导致路径穿越漏洞。"
    enabled: true
    pattern:
      sources:
        # Flask 请求输入
        - name: request.args.get
          description: "Flask GET 参数"
        - name: request.form.get
          description: "Flask POST 表单参数"
        - name: request.values.get
          description: "Flask 合并参数"
        - name: request.get_json
          description: "Flask JSON 请求体"
        # Django 请求输入
        - name: request.GET.get
          description: "Django GET 参数"
        - name: request.POST.get
          description: "Django POST 参数"
        # 通用输入
        - name: input
          description: "Python 内置 input 函数"
      sinks:
        # 文件操作函数
        - name: open
          description: "Python 内置 open 函数"
          vulnerability: "Path Traversal"
        - name: Path.open
          description: "pathlib Path.open 方法"
          vulnerability: "Path Traversal"
        - name: Path.read_text
          description: "pathlib Path.read_text 方法"
          vulnerability: "Path Traversal"
        - name: Path.write_text
          description: "pathlib Path.write_text 方法"
          vulnerability: "Path Traversal"
        - name: os.path.join
          description: "os.path.join 函数"
          vulnerability: "Path Traversal"
        - name: shutil.copy
          description: "shutil.copy 函数"
          vulnerability: "Path Traversal"
        - name: shutil.move
          description: "shutil.move 函数"
          vulnerability: "Path Traversal"
      sanitizers:
        # Flask 安全文件名
        - name: secure_filename
          description: "werkzeug secure_filename"
        # Flask safe_join
        - name: safe_join
          description: "werkzeug safe_join"
        # 路径规范化检查
        - name: os.path.realpath
          condition: boundary_check
          description: "路径规范化并检查边界"
        - name: Path.resolve
          condition: boundary_check
          description: "pathlib 路径规范化并检查边界"

  # ========================================
  # Command Injection 规则
  # ========================================
  - id: TAINT-CMD-001
    name: Command Injection
    type: taint
    severity: ERROR
    engine: taint
    language: python
    cwe: CWE-78
    confidence: high
    message: "用户输入直接用于系统命令执行，可能导致命令注入漏洞。"
    enabled: true
    pattern:
      sources:
        # Flask 请求输入
        - name: request.args.get
          description: "Flask GET 参数"
        - name: request.form.get
          description: "Flask POST 表单参数"
        - name: request.values.get
          description: "Flask 合并参数"
        - name: request.get_json
          description: "Flask JSON 请求体"
        # Django 请求输入
        - name: request.GET.get
          description: "Django GET 参数"
        - name: request.POST.get
          description: "Django POST 参数"
        # 通用输入
        - name: input
          description: "Python 内置 input 函数"
      sinks:
        # 系统命令执行函数
        - name: os.system
          description: "os.system 执行命令"
          vulnerability: "Command Injection"
        - name: os.popen
          description: "os.popen 执行命令"
          vulnerability: "Command Injection"
        - name: subprocess.run
          description: "subprocess.run 执行命令"
          vulnerability: "Command Injection"
        - name: subprocess.Popen
          description: "subprocess.Popen 执行命令"
          vulnerability: "Command Injection"
        - name: subprocess.call
          description: "subprocess.call 执行命令"
          vulnerability: "Command Injection"
        - name: subprocess.check_output
          description: "subprocess.check_output 执行命令"
          vulnerability: "Command Injection"
        - name: subprocess.check_call
          description: "subprocess.check_call 执行命令"
          vulnerability: "Command Injection"
        - name: eval
          description: "eval 执行代码"
          vulnerability: "Command Injection"
        - name: exec
          description: "exec 执行代码"
          vulnerability: "Command Injection"
      sanitizers:
        # shell=False 且使用列表参数
        - name: subprocess.run
          condition: shell_false_list_args
          description: "subprocess.run shell=False 列表参数"
        - name: subprocess.Popen
          condition: shell_false_list_args
          description: "subprocess.Popen shell=False 列表参数"
        - name: subprocess.call
          condition: shell_false_list_args
          description: "subprocess.call shell=False 列表参数"
        - name: subprocess.check_output
          condition: shell_false_list_args
          description: "subprocess.check_output shell=False 列表参数"
        - name: subprocess.check_call
          condition: shell_false_list_args
          description: "subprocess.check_call shell=False 列表参数"
        # shlex.quote
        - name: shlex.quote
          description: "shlex.quote 命令参数净化"