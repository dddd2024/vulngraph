rules:
  - id: AST-TLS-001
    name: Insecure TLS Verification
    type: ast
    severity: WARNING
    engine: ast
    language: python
    cwe: CWE-295
    confidence: medium
    message: "TLS certificate verification is disabled."
    enabled: true
    pattern:
      kind: call
      names:
        - requests.get
        - requests.post
        - requests.put
        - requests.delete
        - requests.request
        - requests.head
        - requests.patch
      keywords:
        verify: false
