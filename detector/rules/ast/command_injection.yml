rules:
  - id: AST-CI-001
    name: Command Injection
    type: ast
    severity: ERROR
    engine: ast
    language: python
    cwe: CWE-78
    confidence: high
    message: "Command injection via os.system or subprocess with shell=True."
    enabled: true
    pattern:
      kind: call
      names:
        - os.system
        - os.popen
      keywords: {}

  - id: AST-CI-002
    name: Command Injection
    type: ast
    severity: ERROR
    engine: ast
    language: python
    cwe: CWE-78
    confidence: high
    message: "Command injection via subprocess with shell=True."
    enabled: true
    pattern:
      kind: call
      names:
        - subprocess.run
        - subprocess.call
        - subprocess.Popen
        - subprocess.check_output
        - subprocess.check_call
      keywords:
        shell: true
