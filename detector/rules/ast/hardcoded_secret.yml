rules:
  - id: AST-HS-001
    name: Hardcoded Secret
    type: ast
    severity: WARNING
    engine: ast
    language: python
    cwe: CWE-798
    confidence: medium
    message: "Hardcoded secret/credential detected."
    enabled: true
    pattern:
      kind: assignment
      target_regex: "(?i)(password|passwd|pwd|secret|secret_key|api_key|apikey|token|access_token|private_key)"
      value_type: string
      min_length: 1
