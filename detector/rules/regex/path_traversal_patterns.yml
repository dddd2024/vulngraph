rules:
  - id: REGEX-PT-001
    name: Path Traversal
    type: regex
    severity: ERROR
    engine: regex
    language: python
    cwe: CWE-22
    confidence: medium
    message: "Potential path traversal via open() with user-controlled input."
    enabled: true
    pattern:
      regex: 'open\(\s*(request\.(args|form)\.get\(.+?\)|path)\s*[,\)]'
