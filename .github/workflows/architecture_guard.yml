# Architecture Guard CI
#
# Runs on every push and pull request to enforce:
# 1. Architecture guard checks (module boundaries, forbidden imports)
# 2. Contract tests (public API stability)
# 3. Module smoke tests (basic functionality)
#
# This ensures that all team members遵守协作边界，
# 防止跨模块修改破坏架构契约。

name: Architecture Guard

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  architecture-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Architecture Guard
        run: |
          python governance/architecture_guard.py
        continue-on-error: false

      - name: Run Contract Tests
        run: |
          python -m pytest tests/contracts/ -v --tb=short

      - name: Run Module Smoke Tests
        run: |
          python -m pytest tests/test_core/test_smoke.py tests/test_core/test_pipeline.py tests/test_agents/test_smoke.py tests/test_analyzers/test_smoke.py tests/test_api/test_smoke.py tests/test_report/test_smoke.py -v --tb=short

      - name: Summary
        if: always()
        run: |
          echo "=== Architecture Guard CI Summary ==="
          echo "All checks completed. See above for details."