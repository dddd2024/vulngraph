# VulnPatch CI
#
# 在每次 push 和 pull_request 时触发，确保：
# 1. 架构守卫检查（模块边界、禁止导入）
# 2. 契约测试（公共 API 稳定性）
# 3. 完整测试套件
#
# 确保所有团队成员遵守协作边界，防止跨模块修改破坏架构契约。

name: VulnPatch CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  architecture-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Architecture Guard
        run: |
          python governance/architecture_guard.py
        continue-on-error: false

      - name: Run Contract Tests
        run: |
          python -m pytest tests/contracts/ -v --tb=short

      - name: Run Full Test Suite
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Summary
        if: always()
        run: |
          echo "=== VulnPatch CI Summary ==="
          echo "All checks completed. See above for details."
