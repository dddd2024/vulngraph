<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VulnPatch - Vulnerability Scanner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1>VulnPatch</h1>
    <div class="header-controls">
      <select id="lang-select">
        <option value="zh-CN">中文</option>
        <option value="en-US">English</option>
      </select>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="main-layout">
    <!-- Left Panel - Input -->
    <div class="left-panel">
      <div class="input-section">
        <div class="input-tabs">
          <button class="tab-btn active" data-type="code">代码片段</button>
          <button class="tab-btn" data-type="path">本地仓库</button>
          <button class="tab-btn" data-type="github">GitHub</button>
        </div>

        <div class="input-content">
          <div class="input-area" id="code-input-area">
            <select id="language-select">
              <option value="auto">自动检测</option>
              <option value="python">Python</option>
              <option value="javascript">JavaScript</option>
              <option value="java">Java</option>
              <option value="c">C/C++</option>
            </select>
            <textarea id="code-input" placeholder="粘贴代码片段..." rows="10"></textarea>
          </div>

          <div class="input-area hidden" id="path-input-area">
            <input type="text" id="repo-path" placeholder="输入本地仓库路径...">
          </div>

          <div class="input-area hidden" id="github-input-area">
            <input type="text" id="repo-url" placeholder="输入 GitHub 仓库 URL...">
          </div>
        </div>

        <button id="analyze-btn" class="analyze-btn">开始分析</button>
      </div>

      <!-- Overview -->
      <div class="overview-section">
        <h3>扫描概览</h3>
        <div id="overview"></div>
      </div>
    </div>

    <!-- Center Panel - Findings -->
    <div class="center-panel">
      <div class="findings-header">
        <h3>漏洞列表</h3>
        <div class="filter-controls">
          <select id="language-filter">
            <option value="all">全部语言</option>
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
            <option value="java">Java</option>
            <option value="c">C/C++</option>
          </select>
        </div>
      </div>
      <div id="findings-list"></div>
    </div>

    <!-- Right Panel - Details -->
    <div class="right-panel">
      <div id="finding-detail"></div>
    </div>
  </div>

  <!-- Bottom Tabs -->
  <div class="bottom-section">
    <div class="bottom-tabs">
      <button class="bottom-tab-btn active" data-tab="graph">调用图</button>
      <button class="bottom-tab-btn" data-tab="knowledge">知识图谱</button>
      <button class="bottom-tab-btn" data-tab="raw">原始 JSON</button>
    </div>

    <div class="bottom-content">
      <div class="bottom-panel" id="graph-panel">
        <div id="graph-container"></div>
      </div>

      <div class="bottom-panel hidden" id="knowledge-panel">
        <div id="knowledge-container"></div>
      </div>

      <div class="bottom-panel hidden" id="raw-panel">
        <div class="raw-controls">
          <button id="copy-json-btn">复制 JSON</button>
        </div>
        <pre id="raw-json"></pre>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span id="status-message">等待输入</span>
    <span id="status-progress"></span>
  </div>

  <!-- Error Display -->
  <div id="error-display" class="error-display hidden"></div>

  <!-- Load modular JS files -->
  <script src="i18n.js"></script>
  <script src="state.js"></script>
  <script src="api.js"></script>
  <script src="findings.js"></script>
  <script src="graph.js"></script>
  <script src="app.js"></script>
</body>
</html>
